name: 025 Final Release v1.0

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Release
        shell: bash
        run: |
          mkdir -p dist
          cp src/ElliottScanner.pine dist/ElliottScanner.pine
          cp README.md dist/README.md

      - name: Create ZIP
        shell: bash
        run: |
          cd dist
          zip -r ElliottScannerPro_v1.0.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElliottScannerPro_v1.0
          path: dist/ElliottScannerPro_v1.0.zip

      - name: Commit Release
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "025 Final Release v1.0"
          git push
