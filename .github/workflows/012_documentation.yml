name: 012 Documentation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  documentation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create README
        shell: bash
        run: |
          cat > README.md <<'EOF'
          # Elliott Scanner Pro

          ## Features
          - Pivot Detection
          - ZigZag Engine
          - Elliott Rule Engine
          - Fibonacci Levels
          - Alternate Counts
          - Confidence Scoring
          - TradingView Alerts

          ## Installation
          Copy src/ElliottScanner.pine into TradingView Pine Editor.

          ## License
          MIT
          EOF

      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          git commit -m "012 Documentation"
          git push
