name: 002 Core Framework (Fixed)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  core:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create source directory
        run: mkdir -p src

      - name: Write ElliottScanner.pine
        shell: bash
        run: |
          set -euo pipefail

          printf '%s
'           '//@version=6'           'indicator("Elliott Scanner Pro", overlay=true, max_labels_count=500)'           ''           '// Version 0.2.0'           'groupGeneral = "General"'           'groupDebug = "Debug"'           'pivotLength = input.int(5, "Pivot Length", minval=2, group=groupGeneral)'           'showPivots = input.bool(true, "Show Pivots", group=groupGeneral)'           'debugMode = input.bool(false, "Debug", group=groupDebug)'           'pivotHigh = ta.pivothigh(high, pivotLength, pivotLength)'           'pivotLow = ta.pivotlow(low, pivotLength, pivotLength)'           'plotshape(showPivots and not na(pivotHigh), style=shape.triangledown, location=location.abovebar, size=size.tiny)'           'plotshape(showPivots and not na(pivotLow), style=shape.triangleup, location=location.belowbar, size=size.tiny)'           'if debugMode and barstate.islast'           '    label.new(bar_index, high, "Elliott Scanner Pro v0.2.0")'           > src/ElliottScanner.pine

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ElliottScanner.pine
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "feat: add core framework"
          git push
