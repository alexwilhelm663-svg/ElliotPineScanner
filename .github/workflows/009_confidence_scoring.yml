name: 009 Confidence Scoring

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  confidence-scoring:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Append Confidence Scoring
        shell: bash
        run: |
          cat >> src/ElliottScanner.pine <<'EOF'

          //=========================
          // Confidence Scoring
          //=========================
          score = 0.0

          score += impulseUp ? 40 : 0
          score += correctionDown ? 20 : 0
          score += not na(lastHigh) ? 20 : 0
          score += not na(lastLow) ? 20 : 0

          confidence = math.min(score, 100)

          var table t = table.new(position.top_right, 1, 1)
          if barstate.islast
              table.cell(t, 0, 0, "Confidence: " + str.tostring(confidence) + "%")
          EOF

      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ElliottScanner.pine
          git diff --cached --quiet && exit 0
          git commit -m "009 Confidence Scoring"
          git push
