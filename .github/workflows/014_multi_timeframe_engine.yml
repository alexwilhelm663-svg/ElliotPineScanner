name: 014 Multi Timeframe Engine

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mtf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Append Multi-Timeframe Engine
        shell: bash
        run: |
          cat >> src/ElliottScanner.pine <<'EOF'

          //=========================
          // Multi-Timeframe Engine
          //=========================
          tfHigher = input.timeframe("240", "Higher Timeframe")

          htfHigh = request.security(syminfo.tickerid, tfHigher, high)
          htfLow  = request.security(syminfo.tickerid, tfHigher, low)
          htfClose = request.security(syminfo.tickerid, tfHigher, close)

          htfBull = htfClose > ta.sma(htfClose, 20)
          htfBear = htfClose < ta.sma(htfClose, 20)

          plot(htfHigh, title="HTF High")
          plot(htfLow, title="HTF Low")
          EOF

      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ElliottScanner.pine
          git diff --cached --quiet && exit 0
          git commit -m "014 Multi Timeframe Engine"
          git push
