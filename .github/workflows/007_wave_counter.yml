name: 007 Wave Counter

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wave-counter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Append Wave Counter
        shell: bash
        run: |
          cat >> src/ElliottScanner.pine <<'EOF'

          //=========================
          // Wave Counter
          //=========================
          var int waveCount = 0

          if not na(ph) or not na(pl)
              waveCount += 1

          waveCount := math.min(waveCount, 5)

          label.new(
              bar_index,
              high,
              "W" + str.tostring(waveCount),
              style=label.style_label_down
          )
          EOF

      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ElliottScanner.pine
          git diff --cached --quiet && exit 0
          git commit -m "007 Wave Counter"
          git push
