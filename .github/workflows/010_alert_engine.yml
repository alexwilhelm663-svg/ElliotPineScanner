name: 010 Alerts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alerts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Append Alert Engine
        shell: bash
        run: |
          cat >> src/ElliottScanner.pine <<'EOF'

          //=========================
          // Alert Engine
          //=========================
          bullishSignal = impulseUp and confidence >= 80
          bearishSignal = correctionDown and confidence >= 80

          alertcondition(bullishSignal,
              title="Bullish Setup",
              message="Bullish Elliott setup detected")

          alertcondition(bearishSignal,
              title="Bearish Setup",
              message="Bearish Elliott setup detected")
          EOF

      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ElliottScanner.pine
          git diff --cached --quiet && exit 0
          git commit -m "010 Alert Engine"
          git push
