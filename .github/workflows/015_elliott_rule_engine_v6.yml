name: 015 Elliott Rule Engine V6

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  elliott-v6:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Append Elliott Rule Engine V6
        shell: bash
        run: |
          cat >> src/ElliottScanner.pine <<'EOF'

          //=========================
          // Elliott Rule Engine V6
          //=========================
          wave1Valid = lastHigh > lastLow
          wave2Valid = close > lastLow
          wave3Valid = lastHigh > nz(lastHigh[1], lastHigh)
          wave4Valid = close > lastLow
          wave5Valid = close > ta.sma(close, 20)

          impulseValid =
               wave1Valid and
               wave2Valid and
               wave3Valid and
               wave4Valid and
               wave5Valid

          plotchar(impulseValid,
              title="Impulse Valid",
              char="5",
              location=location.top)

          alertcondition(
              impulseValid,
              title="Impulse Complete",
              message="Potential Elliott impulse detected")
          EOF

      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ElliottScanner.pine
          git diff --cached --quiet && exit 0
          git commit -m "015 Elliott Rule Engine V6"
          git push
