name: 020 Elliott Setup Scanner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup-scanner:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Append Setup Scanner
        shell: bash
        run: |
          cat >> src/ElliottScanner.pine <<'EOF'

          //=========================
          // Elliott Setup Scanner
          //=========================
          wave12Setup =
               impulseValid and
               htfBull and
               close > fib618

          wave3Breakout =
               wave12Setup and
               close > lastHigh

          abcCompletion =
               abcCorrection and
               close >= fib618

          plotshape(wave12Setup,
               title="1-2 Setup",
               style=shape.circle,
               location=location.belowbar)

          plotshape(wave3Breakout,
               title="Wave 3",
               style=shape.triangleup,
               location=location.belowbar)

          alertcondition(wave12Setup,
               title="1-2 Setup",
               message="Potential Elliott 1-2 setup detected")

          alertcondition(wave3Breakout,
               title="Wave 3 Breakout",
               message="Wave 3 breakout detected")

          alertcondition(abcCompletion,
               title="ABC Complete",
               message="ABC correction completed")
          EOF

      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ElliottScanner.pine
          git diff --cached --quiet && exit 0
          git commit -m "020 Elliott Setup Scanner"
          git push
